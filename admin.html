<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="stylesheet.css">
    <script src="scripts/background.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        async function checkAccess() {
            const SB_URL = 'https://jiswtmhtafbpldvulblw.supabase.co';
            const SB_KEY = 'sb_publishable_F3kZqGgK0_Cw112qu0Us5Q_XJDIr0zm';
            const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

            document.querySelector('.content').style.display = 'none';

            const entry = prompt("Enter Admin Password:");

            if (!entry) {
                alert("No password given. Access Denied.");
                window.location.href = "games.html";
            }

            const { data, error } = await supabaseClient
                .from('admin_settings')
                .select('value')
                .eq('id', 'admin_password')
                .eq('value', entry)
                .maybeSingle();

            if (error || !data) {
                alert("Invalid password. Access Denied.");
                window.location.href = "games.html";
            } else {
                console.log("Access Granted");
                document.querySelector('.content').style.display = 'flex';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.content').style.display = 'none';
            checkAccess();
        });
    </script>
</head>

<body class="iframe-body">
    <div class="content">
        <div class="panel">
            <div class="panel-title">Add Game</div>
            <div class="panel-content">

                <div class="form-group">
                    <label class="form-label">Game Title</label>
                    <input type="text" id="title" class="form-input" placeholder="Game Title">
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="category" class="form-select">
                        <option value="action">Action</option>
                        <option value="racing">Racing</option>
                        <option value="puzzle">Puzzle</option>
                        <option value="idle">Idle</option>
                        <option value="strategy">Strategy</option>
                        <option value="platformer">Platformer</option>
                        <option value="sports">Sports</option>
                        <option value="simulation">Simulation</option>
                        <option value="casual">Casual</option>
                        <option value="creative">Creative</option>
                        <option value="sandbox">Sandbox</option>
                        <option value="shooter">Shooter</option>
                        <option value="multiplayer">Multiplayer</option>
                        <option value="horror">Horror</option>
                        <option value="utility">Utility</option>
                        <option value="casino">Casino</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Path</label>
                    <input type="text" id="link" class="form-input" placeholder="Path">
                </div>

                <div class="form-group">
                    <label class="form-label">Thumbnail</label>
                    <input type="file" id="thumbFile" class="form-input" accept="image/*">
                </div>

                <button onclick="uploadGame()">Upload</button>
                <div id="status" style="margin-top: 8px;"></div>
            </div>
        </div>
    </div>
    <canvas id="bg-canvas"></canvas>

    <script>
        // Replace these with YOUR actual Supabase credentials
        const SB_URL = 'https://jiswtmhtafbpldvulblw.supabase.co';
        const SB_KEY = 'sb_publishable_F3kZqGgK0_Cw112qu0Us5Q_XJDIr0zm';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function uploadGame() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const link = document.getElementById('link').value;
            const file = document.getElementById('thumbFile').files[0];
            const status = document.getElementById('status');

            if (!title || !link || !file) {
                status.innerText = "❌ Please fill all fields!";
                return;
            }

            status.style.color = "#efbf39";
            status.innerText = "⏳ Uploading image...";

            try {
                // Uploads provided image to storage
                const fileName = `${Date.now()}_${file.name}`;
                const { data: storageData, error: storageError } = await supabaseClient
                    .storage
                    .from('thumbnails')
                    .upload(fileName, file);

                if (storageError) throw storageError;

                // Gets the public URL for the image
                const { data: { publicUrl } } = supabaseClient
                    .storage
                    .from('thumbnails')
                    .getPublicUrl(fileName);

                status.innerText = "⏳ Saving to database...";

                // Inserts record into table
                const { error: dbError } = await supabaseClient
                    .from('games')
                    .insert([{ title, category, thumb: publicUrl, link }]);

                if (dbError) {
                    console.log("Full Error Object:", dbError); // Check your F12 console for this!
                    throw new Error(dbError.message + " - " + dbError.details);
                }

                status.style.color = "#4caf50";
                status.innerText = "✅ Game added successfully!";

                document.getElementById('title').value = '';
                document.getElementById('link').value = '';
            } catch (err) {
                console.error(err);
                status.style.color = "#ff5252";
                status.innerText = "❌ Error: " + err.message;
            }
        }
    </script>
</body>

</html>
