<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | InvisEffect</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="scripts/index.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2S8BCG0FHE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-2S8BCG0FHE');
    </script>
</head>

<body>
    <nav class="navbar">
        <button onclick="location.href='index.html'">
            <span class="icon">🏠</span>
            <span class="label">home</span>
        </button>

        <button onclick="location.href='games.html'">
            <span class="icon">🎮</span>
            <span class="label">games</span>
        </button>

        <button onclick="location.href='chat.html'">
            <span class="icon">💬</span>
            <span class="label">chat</span>
        </button>

        <button onclick="location.href='proxy.html'">
            <span class="icon">🛜</span>
            <span class="label">proxy</span>
        </button>

        <button onclick="location.href='https://google.com'">
            <span class="icon">❗</span>
            <span class="label">panic</span>
        </button>
    </nav>

    <canvas id="bg-canvas"></canvas>

    <div id="content" class="glowing">
        <h1>games</h1>
        <p>To view more games, <a style="text-decoration: none; color: #297ff0;" href="../test-branch/">visit the new and improved site.</a></p>

        <div class="genres-container">
            <button onclick="filterGames('all')" class="highlighted">all</button>
            <button onclick="filterGames('action')">action</button>
            <button onclick="filterGames('casual')">casual</button>
            <button onclick="filterGames('driving')">driving</button>
            <button onclick="filterGames('fighting')">fighting</button>
            <button onclick="filterGames('idle')">idle</button>
            <button onclick="filterGames('puzzle')">puzzle</button>
            <button onclick="filterGames('skill')">skill</button>
            <button onclick="filterGames('sports')">sports</button>
            <button onclick="filterGames('strategy')">strategy</button>
        </div>

        <div class="games-container">
        </div>

        <div id="pagination-nav" class="pagination-container"></div>
    </div>

    <div id="game-viewer"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999;">
        <button onclick="closeGameViewer()"
            style="position: absolute; top: 10px; right: 10px; z-index: 10000;">close</button>
        <button onclick="location.href='https://launchpad.classlink.com/olatheusd233?loggedout=1'"
            style="position: absolute; top: 10px; right: 85px; z-index: 10000;">panic</button>
        <iframe id="game-iframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</body>

</html>
