                (function () {
                    // Intercept ALL image creation
                    var OriginalImage = window.Image;
                    window.Image = function () {
                        var img = new OriginalImage();
                        img.crossOrigin = "anonymous";
                        return img;
                    };

                    // Also intercept createElement for img tags
                    var originalCreateElement = document.createElement.bind(document);
                    document.createElement = function (tagName) {
                        var element = originalCreateElement(tagName);
                        if (tagName.toLowerCase() === 'img') {

    This file will have been minified and obfuscated if you enabled "Minify script" during export. -->
            <script src="c7runtime.js"></script>

            <script>
                // Start the Construct 2 project running on window load. 
                jQuery(document).ready(function () {
                    // Create new runtime using the c2canvas
                    cr_createRuntime("c2canvas");
                });

                // Pause and resume on page becoming visible/invisible
                function onVisibilityChanged() {
                    if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                        cr_setSuspended(true);
                    else
                        cr_setSuspended(false);
                };

                document.addEventListener("visibilitychange", onVisibilityChanged, false);
                document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
                document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
                document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

                function OnRegisterSWError(e) {
                    console.warn("Failed to register service worker: ", e);
                };

                // Runtime calls this global method when ready to start caching (i.e. after startup).
                // This registers the service worker which caches resources for offline support.
                window.C2_RegisterSW = function C2_RegisterSW() {
                    if (!navigator.serviceWorker)
                        return;   // no SW support, ignore call

                    try {
                        navigator.serviceWorker.register("sw.js", { scope: "./" })
                            .then(function (reg) {
                                console.log("Registered service worker on " + reg.scope);
                            })
                            .catch(OnRegisterSWError);
                    }
                    catch (e) {
                        OnRegisterSWError(e);
                    }
                };
            </script>

            <!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance -->
            <style>
                /* Container: Bottom center, fixed, with overflow hidden */
                #ad-container {
                    position: fixed;
                    bottom: 0;
                    left: 50%;
                    transform: translateX(-50%);
                    width: min(728px, calc(100% - 20px));
                    /* 728px, 10px margin on mobile */
                    height: 90px;
                    background: rgba(0, 0, 0, 0.90);
                    display: none;
                    z-index: 99999;
                    border-radius: 0;
                    /* Sharp corners */
                    overflow: hidden;
                    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
                    box-sizing: border-box;
                    transition: transform 0.5s ease-in-out;
                    /* Smooth slide-in/out animation */
                }

                /* Slide-out animation */
                #ad-container.hidden {
                    transform: translate(-50%, 100%);
                    /* Slide down out of view */
                }

                #ad-iframe {
                    position: absolute;
                    top: 0;
                    left: 50%;
                    transform: translateX(-50%);
                    width: 745px;
                    /* Updated width */
                    height: 90px;
                    /* Updated height */
                    border: 0;
                    display: block;
                    overflow: hidden;
                    pointer-events: auto;
                    box-sizing: content-box;
                    -ms-overflow-style: none;
                    scrollbar-width: none;
                }

                #ad-iframe::-webkit-scrollbar {
                    display: none;
                    width: 0;
                    height: 0;
                }

                /* Close button with arrow */
                #close-ad {
                    position: absolute;
                    top: 6px;
                    right: 8px;
                    background: #ff4d4d;
                    color: #fff;
                    border: none;
                    padding: 5px 9px;
                    font-size: 13px;
                    border-radius: 4px;
                    cursor: not-allowed;
                    opacity: 0.72;
                    z-index: 100000;
                    display: flex;
                    align-items: center;
                }

                #close-ad.enabled {
                    cursor: pointer;
                    opacity: 1;
                }

                #close-ad::before {
                    content: '↓';
                    /* Down arrow for bottom ad */
                    margin-right: 4px;
                }

                /* Right mask for scrollbar */
                #ad-right-mask {
                    position: absolute;
                    top: 0;
                    right: 0;
                    width: 12px;
                    height: 100%;
                    pointer-events: none;
                    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
                    z-index: 99999;
                }

                /* Mobile adjustments */
                @media (max-width: 440px) {
                    #ad-container {
                        width: calc(100% - 12px);
                        left: 50%;
                        transform: translateX(-50%);
                        border-radius: 0;
                        /* Sharp corners on mobile */
                    }

                    #ad-iframe {
                        width: 728px;
                    }
                }
            </style>
